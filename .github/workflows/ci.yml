name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test:
    name: Typecheck & Test (backend + frontend)
    runs-on: ubuntu-latest

    # Backend tests run against Postgres now (migrated off better-sqlite3 —
    # see backend/src/db.ts). There is no in-memory fallback, so CI needs a
    # disposable Postgres instance and TEST_DATABASE_URL pointing at it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fofafu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Backend tests rely on these env vars (see backend/package.json's
    # `test:run` script). Setting them here lets us run the plain `npm test`
    # fan-out at the workspace root without modifying any package.json.
    env:
      NODE_ENV: test
      JWT_SECRET: test-secret-please-rotate
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fofafu_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # No .nvmrc or `engines` field found in the repo; pinned to the
          # current Node 20 LTS line. Revisit if the repo later declares an
          # explicit version.
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (workspaces-aware)
        run: npm ci

      - name: Typecheck (backend + frontend)
        run: npm run typecheck --workspaces --if-present

      - name: Test (backend + frontend)
        run: npm test --workspaces --if-present
